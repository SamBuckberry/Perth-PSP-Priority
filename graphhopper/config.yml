# GraphHopper configuration for Perth PSP-Priority Cycling Router

graphhopper:
  datareader.file: /graphhopper/data/perth-metro.osm.pbf

  graph.location: /graphhopper/graph-cache

  profiles:
    - name: bike
      custom_model_files: [psp_priority.json]

  custom_models.directory: /graphhopper/custom_models
  custom_areas.directory: /graphhopper/data/export/areas
  profiles_ch: []
  profiles_lm: []

  # Encoded values needed for custom model
  graph.encoded_values: road_class,road_environment,surface,smoothness,bike_access,roundabout,osm_way_id

  # Import settings
  import.osm.ignored_highways: motorway,motorway_link

server:
  application_connectors:
    - type: http
      port: 8989
  request_log:
    appenders: []
